name: Publish Helm chart

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.14.0

      - name: Lint chart
        run: helm lint charts/kubilitics-otel/ --set kubilitics.clusterId=test --set kubilitics.backendUrl=http://example.com

      - name: Verify embedded chart copy is in sync
        # The backend embeds the chart via go:embed (kubilitics-backend/internal/otel/chart/).
        # If a contributor edits charts/kubilitics-otel/ but forgets to run
        # `go generate ./internal/otel/...`, the binary ships a stale chart.
        # This step regenerates the embed copy and fails the workflow if the
        # working tree changed — forcing the contributor to commit the sync.
        run: |
          bash kubilitics-backend/internal/otel/sync_chart.sh
          if ! git diff --quiet kubilitics-backend/internal/otel/chart/; then
            echo "::error::Embedded chart is out of sync with charts/kubilitics-otel/."
            echo "Run 'cd kubilitics-backend && go generate ./internal/otel/...' and commit the result."
            git diff --stat kubilitics-backend/internal/otel/chart/
            exit 1
          fi

      - name: Package chart
        run: |
          mkdir -p _publish
          helm package charts/kubilitics-otel/ -d _publish

      - name: Generate static manifest
        run: |
          helm template kubilitics-otel charts/kubilitics-otel/ \
            --namespace kubilitics-system \
            --set kubilitics.clusterId=REPLACE_WITH_YOUR_CLUSTER_ID \
            --set kubilitics.backendUrl=REPLACE_WITH_YOUR_BACKEND_URL \
            > install/kubilitics-otel.yaml

      - name: Update Helm repo index
        run: |
          if [ -f gh-pages/index.yaml ]; then
            helm repo index _publish --merge gh-pages/index.yaml --url https://charts.kubilitics.io
          else
            helm repo index _publish --url https://charts.kubilitics.io
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _publish

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
