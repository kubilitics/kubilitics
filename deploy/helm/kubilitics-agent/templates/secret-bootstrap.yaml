{{- if or .Values.hub.token .Values.hub.caBundle -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubilitics-agent.fullname" . }}-hub
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  {{- if .Values.hub.token }}
  token: {{ .Values.hub.token | quote }}
  {{- end }}
  {{- if .Values.hub.caBundle }}
  ca.crt: |
{{ .Values.hub.caBundle | indent 4 }}
  {{- end }}
{{- end }}
