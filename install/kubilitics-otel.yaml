# Source: kubilitics-otel/templates/instrumentation.yaml
# OTel Operator Instrumentation CR — referenced by the
# instrumentation.opentelemetry.io/inject-<lang> annotation that users add to
# their deployments. Languages are configurable via .Values.instrumentation.languages.
apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: kubilitics-auto
  namespace: kubilitics-system
  labels:
    helm.sh/chart: kubilitics-otel-0.1.0
    app.kubernetes.io/name: kubilitics-otel
    app.kubernetes.io/instance: kubilitics-otel
    app.kubernetes.io/version: "0.119.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: kubilitics
spec:
  exporter:
    endpoint: http://otel-collector.kubilitics-system:4318
  propagators:
    - tracecontext
    - baggage
  sampler:
    type: parentbased_traceidratio
    argument: "1"
  env:
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: http/json
  java:
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:latest
  python:
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-python:latest
  nodejs:
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-nodejs:latest
  go:
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-go:latest
  dotnet:
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-dotnet:latest
