# Source: kubilitics-otel/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: kubilitics-system
  labels:
    helm.sh/chart: kubilitics-otel-0.1.0
    app.kubernetes.io/name: kubilitics-otel
    app.kubernetes.io/instance: kubilitics-otel
    app.kubernetes.io/version: "0.119.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: kubilitics
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubilitics-otel
      app.kubernetes.io/instance: kubilitics-otel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubilitics-otel
        app.kubernetes.io/instance: kubilitics-otel
      annotations:
        # Force a pod restart when the ConfigMap changes.
        checksum/config: 7e4014f1646e7f21cfb25fef446c65a0f3fc0e43d1490d7c18136f32ab8c31c2
    spec:
      serviceAccountName: otel-collector
      securityContext:
        fsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: otel-collector
          image: "otel/opentelemetry-collector-contrib:0.119.0"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
          args:
            - --config=/conf/collector.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
          env:
            - name: KUBILITICS_CLUSTER_ID
              value: "REPLACE_WITH_YOUR_CLUSTER_ID"
            - name: KUBILITICS_BACKEND_URL
              value: "REPLACE_WITH_YOUR_BACKEND_URL"
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
